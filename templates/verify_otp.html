{% extends 'base.html' %}

{% block title %}Verify Submission - Civic Analyzer{% endblock %}

{% block content %}
<section class="submit-section" style="padding-top: 120px; padding-bottom: 80px; min-height: 100vh; background: #0b0f19; position: relative; overflow: hidden;">
    <!-- Cinematic Background Glows -->
    <div class="glow-orb" style="top: 10%; left: -5%; width: 400px; height: 400px; background: rgba(0, 245, 255, 0.05);"></div>
    <div class="glow-orb" style="bottom: 10%; right: -5%; width: 400px; height: 400px; background: rgba(127, 90, 240, 0.05);"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="glass-card p-5" style="border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; text-align: center; animation: fadeInUp 0.8s ease-out;">
                    <div class="verification-header mb-4">
                        <div class="icon-box-large mx-auto mb-3" style="width: 80px; height: 80px; background: rgba(0, 245, 255, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(0, 245, 255, 0.3);">
                            <i class="fa-solid fa-envelope-shield" style="font-size: 2rem; color: #00f5ff;"></i>
                        </div>
                        <h2 style="font-weight: 700; color: #fff; letter-spacing: -0.5px;">Identity Verification</h2>
                        <p style="color: #94a3b8;">A security code has been transmitted to <br><strong style="color: #fff;">{{ email }}</strong></p>
                    </div>

                    <form action="{{ url_for('verify_otp', email=email) }}" method="POST" id="otpForm">
                        <div class="otp-input-container mb-4" style="display: flex; gap: 10px; justify-content: center;">
                            <!-- Single input for OTP for simplicity, can be expanded to 6 individual inputs -->
                            <input type="text" name="otp" id="otp" maxlength="6" placeholder="000000" required 
                                   style="width: 200px; height: 60px; font-size: 2rem; text-align: center; letter-spacing: 8px; font-family: 'JetBrains Mono', monospace; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #00f5ff; outline: none; transition: border-color 0.3s;"
                                   onfocus="this.style.borderColor='#00f5ff'" onblur="this.style.borderColor='rgba(255, 255, 255, 0.1)'">
                        </div>

                        <div class="timer-display mb-4" id="timerBox">
                            <span style="color: #94a3b8; font-size: 0.9rem;">Expires in: </span>
                            <span id="countdown" style="color: #00f5ff; font-weight: 600; font-family: monospace;">02:00</span>
                        </div>

                        <button type="submit" class="btn btn-primary w-100" style="padding: 15px; border-radius: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; background: linear-gradient(135deg, #00f5ff 0%, #7f5af0 100%); border: none; box-shadow: 0 4px 20px rgba(0, 245, 255, 0.3); transition: transform 0.3s, box-shadow 0.3s;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 8px 25px rgba(0, 245, 255, 0.4)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 20px rgba(0, 245, 255, 0.3)'">
                            Finalize Submission
                        </button>

                        <div class="mt-4">
                            <p style="color: #94a3b8; font-size: 0.9rem;">Didn't receive the code? 
                                <a href="{{ url_for('submit') }}" style="color: #00f5ff; text-decoration: none; font-weight: 500;">Go Back</a> or check your spam folder.
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    // Countdown Timer Logic
    let timeLeft = 120; // 2 minutes
    const countdownEl = document.getElementById('countdown');
    
    const timer = setInterval(() => {
        const minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;
        seconds = seconds < 10 ? '0' + seconds : seconds;
        
        countdownEl.innerText = `0${minutes}:${seconds}`;
        
        if (timeLeft <= 0) {
            clearInterval(timer);
            countdownEl.innerText = "EXPIRED";
            countdownEl.style.color = "#ef4444";
        }
        timeLeft--;
    }, 1000);

    // Auto-focus the OTP input
    document.getElementById('otp').focus();
</script>

<style>
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .glass-card {
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(20px);
    }
</style>
{% endblock %}
