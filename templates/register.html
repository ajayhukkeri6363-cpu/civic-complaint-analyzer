{% extends 'base.html' %}

{% block title %}Register - Civic Complaint Analyzer{% endblock %}

{% block content %}
<div class="login-container" style="max-width: 500px; margin: 4rem auto;">
    <div class="card login-card" style="padding: 2.5rem; border-top: 5px solid var(--secondary-color);">
        <div class="text-center mb-4">
            <i class="fa-solid fa-user-plus" style="font-size: 3rem; color: var(--secondary-color); margin-bottom: 1rem;"></i>
            <h2 style="margin-bottom: 0.5rem;" id="regTitle">Create Account</h2>
            <p style="color: var(--text-muted);" id="regSub">Join the civic analyzer community.</p>
        </div>

        <form action="{{ url_for('register') }}" method="POST" id="registerForm" data-no-spa>
            <div class="form-group mb-4">
                <label class="form-label">I am a...</label>
                <div class="d-flex gap-3 mt-2">
                    <div class="form-check role-btn">
                        <input class="btn-check" type="radio" name="role" id="roleCitizen" value="citizen" checked>
                        <label class="btn btn-outline-secondary w-100" for="roleCitizen">Citizen</label>
                    </div>
                    <div class="form-check role-btn">
                        <input class="btn-check" type="radio" name="role" id="roleAdmin" value="admin">
                        <label class="btn btn-outline-secondary w-100" for="roleAdmin">Official Admin</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" id="name" name="name" class="form-control" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required placeholder="yourname@example.com">
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••">
            </div>
            
            <div id="adminKeyBlock" style="display: none;">
                <div class="form-group" style="padding: 1.5rem; border: 1px solid var(--secondary-color); border-radius: 12px; background: rgba(0, 243, 255, 0.05);">
                    <label for="govt_id" class="form-label" style="color: var(--secondary-color);">Admin Enrollment Key</label>
                    <input type="password" id="govt_id" name="govt_id" class="form-control" placeholder="Enter Secret Team Key">
                    <p style="margin-top: 0.75rem; font-size: 0.85rem; color: var(--text-muted);">
                        <i class="fa-solid fa-shield-halved"></i> Only authorized officials can create Admin accounts.
                    </p>
                </div>
            </div>
            
            <script>
                document.querySelectorAll('input[name="role"]').forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        const isAdmin = e.target.value === 'admin';
                        const keyBlock = document.getElementById('adminKeyBlock');
                        const keyInput = document.getElementById('govt_id');
                        const title = document.getElementById('regTitle');
                        
                        keyBlock.style.display = isAdmin ? 'block' : 'none';
                        keyInput.required = isAdmin;
                        title.innerText = isAdmin ? 'Create Admin Account' : 'Create Account';
                    });
                });
            </script>
            
            <div class="mt-4">
                <button type="submit" class="btn btn-secondary btn-lg" style="width: 100%; background-color: var(--secondary-color); border-color: var(--secondary-color);">
                    <i class="fa-solid fa-user-check"></i> Sign Up
                </button>
            </div>
        </form>
        
        <div class="text-center mt-4" style="border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
            <p style="font-size: 0.9rem;">Already have an account? 
                <a href="{{ url_for('login') }}" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">
                    Sign In
                </a>
            </p>
            <div class="mt-2">
                <a href="{{ url_for('index') }}" style="color: var(--text-muted); text-decoration: none; font-size: 0.85rem;">
                    <i class="fa-solid fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
